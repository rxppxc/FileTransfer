server {
    listen 80;
    server_name localhost;

    # Compresión: los bundles JS/CSS de Vite bajan ~70% de peso transferido.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    # Los assets de Vite llevan hash en el nombre (index-a1b2c3.js): si el
    # contenido cambia, cambia el nombre — cachearlos "para siempre" es seguro.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
        # index.html no lleva hash en el nombre — si el navegador la cachea,
        # puede seguir apuntando al bundle JS de un deploy anterior. Los
        # archivos bajo /assets/ sí llevan hash y cachean agresivo arriba.
        add_header Cache-Control "no-cache";
    }
    location /api/ {
        # Sin barra final en proxy_pass: el backend enruta bajo /api/v1/...,
        # así que la URI debe llegarle completa. Con "http://backend:8000/"
        # (barra final) nginx recortaría el prefijo /api y todo daría 404.
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Subidas: el backend acepta archivos de hasta 50 MB (MAX_FILE_SIZE_MB)
        # y varias piezas por request; sin esto nginx corta en 1 MB (default).
        client_max_body_size 200m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }
}
