services:
  postgres_db:
    image: postgres:15-alpine
    container_name: snm_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Solo accesible desde el propio servidor (psql/pg_dump locales o docker exec).
      # El backend le habla por la red interna de Docker; publicarlo en 0.0.0.0
      # exponía la BD a toda la red sin necesidad.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    container_name: snm_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=FileTransfer - SNM
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ALGORITHM=HS256
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      - LDAP_HOST=${LDAP_HOST}
      - LDAP_PORT=389
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_BIND_USER=${LDAP_BIND_USER}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_TIMEOUT=10
      - LDAP_ALLOWED_OU=
      - STORAGE_PATH=/app/storage/transfers
      - MAX_FILE_SIZE_MB=50
      - TRANSFER_EXPIRY_DAYS=7
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=25
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_FROM_NAME=FileTransfer - SNM
      - LIMPIEZA_INTERVALO_HORAS=6
      - LIMPIEZA_RETENER_DIAS=0
      - FRONTEND_URL=${APP_URL}
      - APP_URL=${APP_URL}
      - RATE_LIMIT_DOWNLOADS_PER_MINUTE=30
      # Temporal (fase de pruebas) — quitar esta línea antes de producción real.
      - PERMITIR_LOGIN_LOCAL=${PERMITIR_LOGIN_LOCAL:-false}
    volumes:
      - filetransfer_storage:/app/storage/transfers
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      # python está garantizado en la imagen; curl no viene en python:3.11-slim.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: snm_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      # 127.0.0.1 explícito: "localhost" resuelve primero a ::1 (IPv6) dentro
      # del contenedor y nginx solo escucha en IPv4 → falso "unhealthy".
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  filetransfer_storage:
